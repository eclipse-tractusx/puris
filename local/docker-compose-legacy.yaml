version: "3"
services:
  puris-frontend-customer:
    extends:
      file: ./docker-compose.yaml
      service: puris-frontend-customer
  puris-backend-customer:
    extends:
      file: ./docker-compose.yaml
      service: puris-backend-customer
    env_file:
      - ./tractus-x-edc/config/customer/puris-backend-legacy.properties
  dtr-customer:
    extends:
      file: ./docker-compose.yaml
      service: dtr-customer
  postgres-all:
    extends:
      file: ./docker-compose.yaml
      service: postgres-all
  edc-customer-control-plane:
    extends:
      file: ./docker-compose.yaml
      service: edc-customer-control-plane
    image: tractusx/edc-controlplane-postgresql-hashicorp-vault:0.10.3
    env_file:
      - ./tractus-x-edc/config/customer/control-plane-legacy.properties
  edc-customer-data-plane:
    extends:
      file: ./docker-compose.yaml
      service: edc-customer-data-plane
    image: tractusx/edc-dataplane-hashicorp-vault:0.10.3
  puris-frontend-supplier:
    extends:
      file: ./docker-compose.yaml
      service: puris-frontend-supplier
  puris-backend-supplier:
    extends:
      file: ./docker-compose.yaml
      service: puris-backend-supplier
  dtr-supplier:
    extends:
      file: ./docker-compose.yaml
      service: dtr-supplier
  edc-supplier-control-plane:
    extends:
      file: ./docker-compose.yaml
      service: edc-supplier-control-plane
  edc-supplier-data-plane:
    extends:
      file: ./docker-compose.yaml
      service: edc-supplier-data-plane
  puris-keycloak:
    extends:
      file: ./docker-compose.yaml
      service: puris-keycloak

networks:
  miw-net:
    external: true
{{- if .Values.postgresql.enabled -}}
{{- $authSecretName := .Values.postgresql.auth.existingSecret -}}
{{- $customUserSecretName := .Values.postgresql.customUser.existingSecret | default $authSecretName -}}
{{- $sameSecret := eq $authSecretName $customUserSecretName -}}
{{- $hasCustomUser := or .Values.postgresql.customUser.name .Values.postgresql.customUser.existingSecret -}}
{{- $adminPwKey := .Values.postgresql.auth | dig "secretKeys" "adminPasswordKey" "postgres-password" -}}
{{- $pwKey := .Values.postgresql.customUser | dig "secretKeys" "password" "CUSTOM_PASSWORD" -}}
{{- $nameKey := .Values.postgresql.customUser | dig "secretKeys" "name" "CUSTOM_USER" -}}
{{- $dbKey := .Values.postgresql.customUser | dig "secretKeys" "database" "CUSTOM_DB" -}}
{{- if $authSecretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $authSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "puris.backend.labels" . | nindent 4 }}
type: Opaque
{{- $secret := (lookup "v1" "Secret" .Release.Namespace $authSecretName) }}
{{ if $secret -}}
data:
  # if secret exists, use value provided from values file (to cover update scenario) or existing value from secret
  # use data map instead of stringData to prevent base64 encoding of already base64-encoded existing value from secret
  # use index function for secret keys with hyphen otherwise '$secret.data.secretKey' works too
  {{ $adminPwKey }}: {{ (.Values.postgresql.auth.password | b64enc) | default (index $secret.data $adminPwKey) | quote }}
  {{- if and $hasCustomUser $sameSecret }}
  {{ $pwKey }}: {{ (.Values.postgresql.customUser.password | b64enc) | default (index $secret.data $pwKey) | quote }}
  {{ $nameKey }}: {{ (.Values.postgresql.customUser.name | b64enc) | default (index $secret.data $nameKey) | quote }}
  {{ $dbKey }}: {{ (.Values.postgresql.customUser.database | b64enc) | default (index $secret.data $dbKey) | quote }}
  {{- end }}
{{ else }}
stringData:
  # if secret doesn't exist, use provided value from values file or generate a random one
  {{ $adminPwKey }}: {{ .Values.postgresql.auth.password | default (randAlphaNum 16) | quote }}
  {{- if and $hasCustomUser $sameSecret }}
  {{ $pwKey }}: {{ .Values.postgresql.customUser.password | default (randAlphaNum 16) | quote }}
  {{ $nameKey }}: {{ .Values.postgresql.customUser.name | default "puris" | quote }}
  {{ $dbKey }}: {{ .Values.postgresql.customUser.database | default "puris" | quote }}
  {{- end }}
{{ end }}
{{- end -}}
{{- if and $hasCustomUser (not $sameSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $customUserSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "puris.backend.labels" . | nindent 4 }}
type: Opaque
{{- $customSecret := (lookup "v1" "Secret" .Release.Namespace $customUserSecretName) }}
{{ if $customSecret -}}
data:
  # if secret exists, use value provided from values file (to cover update scenario) or existing value from secret
  {{ $pwKey }}: {{ (.Values.postgresql.customUser.password | b64enc) | default (index $customSecret.data $pwKey) | quote }}
  {{ $nameKey }}: {{ (.Values.postgresql.customUser.name | b64enc) | default (index $customSecret.data $nameKey) | quote }}
  {{ $dbKey }}: {{ (.Values.postgresql.customUser.database | b64enc) | default (index $customSecret.data $dbKey) | quote }}
{{ else }}
stringData:
  # if secret doesn't exist, use provided value from values file or generate a random one
  {{ $pwKey }}: {{ .Values.postgresql.customUser.password | default (randAlphaNum 16) | quote }}
  {{ $nameKey }}: {{ .Values.postgresql.customUser.name | default "puris" | quote }}
  {{ $dbKey }}: {{ .Values.postgresql.customUser.database | default "puris" | quote }}
{{ end }}
{{- end }}
{{- end }}
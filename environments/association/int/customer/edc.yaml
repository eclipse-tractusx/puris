install:
  postgresql: true
  vault: false

participant:
  # migration 0.10.x -> 0.11.x: differ id and bpnl
  id: <path:puris/data/customer#did-url>
  # -- BPN Number
  bpnl: <path:puris/data/customer#bpnl>
  # migration 0.11.x -> 0.12.x: add context id for multitenancy
  contextId: <path:puris/data/customer#context-id>

controlplane:
  # -- Scale to 0 for scaledown
  # autoscaling:
  #     enabled: false
  replicaCount: 1
  # -- endpoints of the control plane
  endpoints:
    management:
      authKey: <path:puris/data/customer/edc#api-key>
  bdrs:
    # time that a cached BPN/DID resolution map is valid in seconds, default is 10 min
    cache_validity_seconds: 0
    server:
      # URL of the BPN/DID Resolution Service - required:
      url: <path:puris/data/environment#bdrs-url>
  # 0.9.0: disable policy validation first
  policy:
    validation:
      enabled: false
  resources:
    requests:
      cpu: "20m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  ## Ingress declaration to expose the network service.
  ingresses:
    ## Public / Internet facing Ingress
    - enabled: true
      # -- The hostname to be used to precisely map incoming traffic onto the underlying network service
      hostname: <path:puris/data/customer/edc#hostname-internet>
      # -- Additional ingress annotations to add
      annotations:
        # cert manager for ingress on CX int
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      # -- EDC endpoints exposed by this ingress resource
      endpoints:
        - protocol
        - management
      # -- Defines the [ingress class](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class)  to use
      className: "nginx"
      # -- TLS [tls class](https://kubernetes.io/docs/concepts/services-networking/ingress/#tls) applied to the ingress resource
      tls:
        # -- Enables TLS on the ingress resource
        enabled: true
        # -- If present overwrites the default secret name
        secretName: tls-secret-edc-customer-controlplane
    ## Public / Internet facing Ingress
    - enabled: true
      # -- The hostname to be used to precisely map incoming traffic onto the underlying network service
      hostname: <path:puris/data/customer/edc#hostname-intranet>
      # -- EDC endpoints exposed by this ingress resource
      endpoints:
        - control
      # -- Defines the [ingress class](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class)  to use
      className: "nginx"
      # -- TLS [tls class](https://kubernetes.io/docs/concepts/services-networking/ingress/#tls) applied to the ingress resource
      tls:
        # -- Enables TLS on the ingress resource
        enabled: false
  # -- declare where to mount [volumes](https://kubernetes.io/docs/concepts/storage/volumes/) into the container
  # -- configuration of the [Java Util Logging Facade](https://docs.oracle.com/javase/7/docs/technotes/guides/logging/overview.html)
  logging: |-
    .level=DEBUG
    org.eclipse.edc.level=ALL
    handlers=java.util.logging.ConsoleHandler
    java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
    java.util.logging.ConsoleHandler.level=ALL
    java.util.logging.SimpleFormatter.format=[%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS] [%4$-7s] %5$s%6$s%n
  env:
    EDC_CATALOG_CACHE_EXECUTION_ENABLED: false
    EDC_DCP_V08_FORCED: true

dcp:
  # Decentralized IDentifier
  id: <path:puris/data/customer#did-url>
  # -- Configures the trusted issuers for this runtime
  trustedIssuers: # array [] that needs to be expand but likely like (sorry unconfirmed on how this is done, as I also would need to check)
    - <path:puris/data/environment#trusted-issuer-1>
  sts:
    div: #TDO urls
      url: <path:puris/data/environment#dim-url>
    oauth:
      token_url: <path:puris/data/customer#dim-idp-token-url>
      client:
        id: <path:puris/data/customer#dim-idp-client-id>
        # not supported, see https://github.com/eclipse-edc/Connector/discussions/4135
        # secret_alias: "puris/data/customer#dim-idp-client-secret"
        secret_alias: "CUSTOMER_EDC/CLIENT_SECRET"
  # migration 0.11.x -> 0.12.x: cache verified credentials for a certain time to reduce load on the DIM
  cache:
    # -- Whether the Verifiable Presentation cache is enabled
    enabled: false
    # -- Validity of the Verifiable Presentation cache in seconds
    validity: 0
  # migration 0.11.x -> 0.12.x: add feature to register connector service in DID
  didService:
    selfRegistration:
      enabled: false
      # -- The URL of the BDRS to register the runtime's DID at
      id: <path:puris/data/customer#did-url>

dataplane:
  # -- Scale to 0 for scaledown
  # autoscaling:
  #  enabled: false
  replicaCount: 1
  endpoints:
    proxy:
      authKey: <path:puris/data/customer/edc#api-key>

  token:
    signer:
      privatekey_alias: DATAPLANE_PROXY_PRIVATE_KEY
    verifier:
      publickey_alias: DATAPLANE_PROXY_PUBLIC_KEY
  resources:
    requests:
      cpu: "20m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  # "valueFrom" environment variable references that will be added to deployment pods. Name is templated.
  # ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.19/#envvarsource-v1-core
  ## Ingress declaration to expose the network service.
  ingresses:
    ## Public / Internet facing Ingress
    - enabled: true
      # -- The hostname to be used to precisely map incoming traffic onto the underlying network service
      hostname: <path:puris/data/customer/edc#hostname-internet>
      # -- Additional ingress annotations to add
      annotations:
        # cert manager for ingress on CX int
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      # -- EDC endpoints exposed by this ingress resource
      endpoints:
        - public
      # -- Defines the [ingress class](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class)  to use
      className: "nginx"
      # -- TLS [tls class](https://kubernetes.io/docs/concepts/services-networking/ingress/#tls) applied to the ingress resource
      tls:
        # -- Enables TLS on the ingress resosurce
        enabled: true
        # -- If present overwrites the default secret name
        secretName: tls-secret-edc-customer-dataplane
      ## Adds [cert-manager](https://cert-manager.io/docs/) annotations to the ingress resource
  logging: |-
    .level=DEBUG
    org.eclipse.edc.level=ALL
    handlers=java.util.logging.ConsoleHandler
    java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
    java.util.logging.ConsoleHandler.level=ALL
    java.util.logging.SimpleFormatter.format=[%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS] [%4$-7s] %5$s%6$s%n
postgresql:
  # not needed anymore since 0.10.2
  # image:
  #   repository: bitnamilegacy/postgresql
  #   tag: 16.2.0-debian-12-r10
  jdbcUrl: "jdbc:postgresql://{{ .Release.Name }}-postgresql:5432/<path:puris/data/customer/edc/postgres#database>"
  primary:
    persistence:
      enabled: true
      size: 2Gi
    storageClass: "default"
    # emergency access restoration
    # pgHbaConfiguration: |-
    #   local all all trust
    #   host all all all md5  
  # readReplicas:
  #   persistence:
  #     enabled: true
  auth:
    database: "postgres"
    username: "postgres"
    password: <path:puris/data/customer/edc/postgres#postgresPassword>
  customUser:
    # --  Name of the custom user to be created. If an existing secret is used, this value is overwritten into the existing secret.
    # @default -- edc
    name: <path:puris/data/customer/edc/postgres#user>
    # -- Name for the custom database to be created and assigned to the custom user. If an existing secret is used, this value is overwritten into the existing secret.
    # @default -- edc
    database: <path:puris/data/customer/edc/postgres#database>
    # -- Password to be used for the custom user. If an existing secret is used, this value is overwritten into the existing secret.
    # @default -- Autogenerated random alpha=numeric string with 16 characters (if empty).
    password: <path:puris/data/customer/edc/postgres#password>
  resources:
    requests:
      cpu: "20m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
vault:
  hashicorp:
    enabled: true
    url: <path:puris/data/environment#vault-url>
    token: <path:puris/data/environment#vault-token>
    timeout: 30
    healthCheck:
      enabled: true
      standbyOk: true
    paths:
      secret: /v1/puris
      health: /v1/sys/health

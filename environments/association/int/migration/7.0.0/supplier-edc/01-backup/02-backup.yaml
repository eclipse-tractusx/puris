apiVersion: batch/v1
kind: Job
metadata:
  name: pg-backup-job-supplier-edc
  namespace: product-puris
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: backup
        image: postgres:16
        command:
        - /bin/sh
        - -c
        - |
          echo "Starting backup..."
          pg_dump -h supplier-edc-postgresql -U postgres -d edc -F c -f /migration/db.dump
          echo "Backup complete. Verifying file size:"
          ls -lh /migration/db.dump
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: supplier-edc-postgresql
              key: postgres-password
        volumeMounts:
        - name: storage
          mountPath: /migration
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: migration-pvc-supplier-edc
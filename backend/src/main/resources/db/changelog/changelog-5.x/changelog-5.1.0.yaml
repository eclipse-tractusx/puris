databaseChangeLog:
  - changeSet:
      id: "1"
      author: ReneSchroederLJ
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: material_relation
      changes:
        - createTable:
            tableName: material_relation
            columns:
              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: material_relation_pkey
              - column:
                  name: parent_own_material_number
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: child_own_material_number
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: FLOAT8
                  constraints:
                    nullable: false
              - column:
                  name: measurement_unit
                  type: SMALLINT
                  constraints:
                    nullable: false
              - column:
                  name: valid_from
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: valid_to
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: created_on
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: last_modified_on
                  type: TIMESTAMP WITHOUT TIME ZONE
  - changeSet:
        id: "2"
        author: gobica
        changes:
          - createTable:
              columns:
                - column:
                    constraints:
                      nullable: false
                      primaryKey: true
                      primaryKeyName: single_level_bom_as_planned_contract_mapping_pkey
                    name: partner_bpnl
                    type: VARCHAR(255)
              tableName: single_level_bom_as_planned_contract_mapping